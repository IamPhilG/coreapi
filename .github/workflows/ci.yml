name: CI

# Pull-request validation: restore, build, unit + HTTP end-to-end tests, and a vulnerable-package
# scan. Intentionally excludes the AD/AWS integration tests (CoreApi.IntegrationTests), which need
# a real Domain Controller and AWS credentials and must only run in an authorized environment.
# No secrets, no cloud resources, no deployment, no publish.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore (locked)
        run: dotnet restore --locked-mode

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      # The unit test project also holds the HTTP end-to-end guardrail tests (Swagger by
      # environment, rate limiting, health) and the observability tests, which boot the app
      # in-memory with no DC and no AWS. A TRX result is written into artifacts/ci for upload.
      - name: Unit + HTTP end-to-end tests (no DC, no AWS)
        run: >-
          dotnet test tests/CoreApi.UnitTests/CoreApi.UnitTests.csproj
          --configuration Release --no-build
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory artifacts/ci

      # The scan always exits 0, so decide pass/fail from its machine-readable JSON rather than a
      # console phrase (language- and wording-independent). A project only carries a `frameworks`
      # node when it has vulnerable packages; count every vulnerability across top-level and
      # transitive references and fail if any exist. Runs even if tests failed so the evidence
      # bundle is complete; the JSON is written into artifacts/ci for upload.
      #
      # Null-safety matters here: in PowerShell `@($null).Count` is 1, not 0. Wrapping a missing
      # node directly in @() therefore yields a one-element array holding $null, and the previous
      # parser counted that phantom element. With three clean projects (no `frameworks` node at
      # all) it reported six vulnerabilities instead of zero. Every level is now filtered with
      # `Where-Object { $null -ne $_ }` so an absent node contributes exactly zero, and only real
      # entries of the `vulnerabilities` array are counted. Fail-closed behaviour is unchanged:
      # a failed command, a missing/empty report, unparseable JSON, or any real vulnerability
      # still fails the build.
      - name: Vulnerable package scan
        if: always()
        shell: pwsh
        run: |
          $reportDir = Join-Path $env:GITHUB_WORKSPACE "artifacts/ci"
          New-Item -ItemType Directory -Path $reportDir -Force | Out-Null
          $reportPath = Join-Path $reportDir "vulnerable-packages.json"

          dotnet package list `
            --include-transitive `
            --vulnerable `
            --format json `
            > $reportPath

          if ($LASTEXITCODE -ne 0) {
              throw "dotnet package list failed with exit code $LASTEXITCODE"
          }

          if (-not (Test-Path $reportPath) -or (Get-Item $reportPath).Length -eq 0) {
              throw "dotnet package list did not produce a JSON report"
          }

          try {
              $report = Get-Content $reportPath -Raw |
                  ConvertFrom-Json -ErrorAction Stop
          }
          catch {
              throw "Unable to parse vulnerability report: $($_.Exception.Message)"
          }

          $count = 0
          foreach ($project in @($report.projects | Where-Object { $null -ne $_ })) {
            foreach ($framework in @($project.frameworks | Where-Object { $null -ne $_ })) {
              $packages = @($framework.topLevelPackages   | Where-Object { $null -ne $_ }) +
                          @($framework.transitivePackages | Where-Object { $null -ne $_ })
              foreach ($package in $packages) {
                $count += @($package.vulnerabilities | Where-Object { $null -ne $_ }).Count
              }
            }
          }
          Write-Host "Vulnerable package references found: $count"
          if ($count -gt 0) {
            $report.projects | ConvertTo-Json -Depth 10
            Write-Error "Vulnerable NuGet packages detected."
            exit 1
          }

      # Bundle the TRX test results and the vulnerability JSON as a single downloadable artifact,
      # even when a previous step failed, so failures are diagnosable from the evidence.
      - name: Upload CI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence
          path: artifacts/ci/
          # These are diagnostic evidence, not releases: keep them recoverable for a while, then
          # let them expire. warn (not error) so a genuine build failure that produced no files
          # isn't masked by an artifact-upload failure.
          retention-days: 30
          if-no-files-found: warn
